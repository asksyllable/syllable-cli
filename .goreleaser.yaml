version: 2

project_name: syllable

before:
  hooks:
    - sh -c "cd scripts/syllable-cli && go mod tidy"
    - sh -c "cd scripts/syllable-cli && go test ./..."

builds:
  - id: syllable
    dir: scripts/syllable-cli
    main: .
    binary: syllable
    ldflags:
      - -s -w
      - -X github.com/asksyllable/syllable-cli/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: syllable
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Improvements"
      order: 2

release:
  github:
    owner: asksyllable
    name: syllable-cli
  extra_files:
    - glob: "install.sh"
